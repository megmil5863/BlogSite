<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blog</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>My Blog Website</h1>
  </header>

  <!-- NAVIGATION -->
  <nav>
    <a href="#home">Home</a>
    <a href="#blog">Blog</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- MAIN CONTENT -->
  <main>

    <!-- BLOG SECTION -->
    <section id="blog">

      <article>
        <h2>Blog Post 1</h2>
        <p>This is the first paragraph of blog post 1.</p>
        <p>This is the second paragraph of blog post 1.</p>
      </article>

      <article>
        <h2>Blog Post 2</h2>
        <p>This is the first paragraph of blog post 2.</p>
        <p>This is the second paragraph of blog post 2.</p>
      </article>

    </section>

    <!-- CONTACT SECTION -->
    <section id="contact">
      <h2>Contact Information</h2>

      <form>

        <label>Name:</label>
        <input type="text" name="name" required>

        <label>Email:</label>
        <input type="email" name="email" required>

        <label>Subject:</label>
        <input type="text" name="subject">

        <label>Message:</label>
        <textarea name="message" required></textarea>

        <button type="submit">Submit</button>

      </form>

    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>StudentID: MegMil5863©</p>
  </footer>

</body>
</html>
